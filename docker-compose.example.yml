services:
  gphotos-uploader:
    build: .
    container_name: gphotos-uploader
    restart: unless-stopped
    environment:
      - WATCHED_FOLDER=/data
      # true/false: delete local files after successful upload
      - DELETE_AFTER_UPLOAD=false
      # Enter AUTH_DATA from adb logcat here
      - AUTH_DATA=PLACEHOLDER_KEY_HERE
    security_opt:
      - label:disable
    volumes:
      # Replace the path below with your photo folder on the host
      - /path/to/your/photos/on/host:/data:z
      - ./script_gphoto.py:/app/script_gphoto.py:z
      - ./index.html:/app/index.html:z
    ports:
      - "8080:8080"
